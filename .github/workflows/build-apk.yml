name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create .env file with dummy API key
        run: echo "GEMINI_API_KEY=PLACEHOLDER_KEY" > .env

      - name: Set up debug keystore
        run: |
          rm -f debug.keystore
          if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from secret..."
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore
          else
            echo "Generating a fresh debug keystore..."
            keytool -genkeypair \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "Keystore ready: $(ls -lh debug.keystore)"

      - name: Find or create gradlew
        run: |
          # Show repo structure for debugging
          echo "=== Repo root contents ==="
          ls -la
          echo "=== Searching for gradlew ==="
          find . -name "gradlew" -not -path "*/build/*" 2>/dev/null || true

          if [ -f "./gradlew" ]; then
            echo "Found gradlew in root"
            chmod +x ./gradlew
          else
            echo "gradlew not found — generating via Gradle wrapper..."
            # Install gradle to generate the wrapper
            wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
            chmod +x ./gradlew
            echo "gradlew generated successfully"
          fi

      - name: Remove signingConfig line from debug build type
        run: |
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: panorama-downloader-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
