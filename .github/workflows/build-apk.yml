name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create .env file with dummy API key
        run: echo "GEMINI_API_KEY=PLACEHOLDER_KEY" > .env

      - name: Set up debug keystore
        run: |
          rm -f debug.keystore
          if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from secret..."
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore
          else
            echo "Generating a fresh debug keystore..."
            keytool -genkeypair \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug, O=Android, C=US"
          fi

      - name: Set up Gradle 9.3.1 wrapper (required by AGP 9.1.1)
        run: |
          # Write correct gradle-wrapper.properties directly
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.3.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS

          # Bootstrap the gradlew script using a downloaded Gradle binary
          wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-9.3.1/bin/gradle wrapper --gradle-version 9.3.1 --distribution-type bin
          chmod +x ./gradlew
          echo "Gradle wrapper ready:"
          ./gradlew --version

      - name: Remove signingConfig line from debug build type
        run: |
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: panorama-downloader-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30